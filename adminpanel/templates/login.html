{% load static %}

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход в админ-панель — Кухни мира</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-orange-600">Кухни мира</h1>
        <p class="text-gray-600 mt-2">Административная панель</p>
        <p class="text-sm text-gray-500 mt-1">
          2026 — Год единства народов России
        </p>
      </div>

      <form id="loginForm" class="space-y-6" action="" method="POST">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Электронная почта</label
          >
          <input
            type="email"
            id="email"
            name="email"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500"
            placeholder="admin@champ2026"
            required
          />
          {% for i in errors.email %}
          <p id="emailError" class="text-red-500 text-sm mt-1">{{ i }}</p>
          {% endfor %}
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Пароль</label
          >
          <input
            type="password"
            name="password"
            id="password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500"
            placeholder="••••••••"
            required
          />
          {% for i in errors.password %}
          <p id="emailError" class="text-red-500 text-sm mt-1">{{ i }}</p>
          {% endfor %}
        </div>

        <div
          id="generalError"
          class="text-red-500 text-sm text-center"
        >{{ error }}</div>

        <button
          type="submit"
          class="w-full bg-orange-600 hover:bg-orange-700 text-white font-semibold py-3 rounded-lg transition"
        >
          Войти
        </button>
      </form>

      <div class="text-center mt-6 text-xs text-gray-500">
        Логин: <span class="font-mono">admin@champ2026</span><br />
        Пароль: <span class="font-mono">champ2026</span>
      </div>
    </div>
  </body>
</html>
